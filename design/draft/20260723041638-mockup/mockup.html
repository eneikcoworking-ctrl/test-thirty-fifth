</div>
</div>
<!-- Password Field -->

<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>

<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Stay signed in for 30 days</label>

<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('click', (e) => {
                if (el.getAttribute('href') === '#') e.preventDefault();
            });
        });

        // Simple input validation visual cue
        const emailInput = document.getElementById('email');
        const submitBtn = document.querySelector('button[type="submit"]');

        emailInput.addEventListener('input', (e) => {
            if (e.target.value.includes('@') && e.target.value.length > 5) {
                e.target.parentElement.classList.remove('border-outline-variant');
                e.target.parentElement.classList.add('border-primary');
            } else {
                e.target.parentElement.classList.add('border-outline-variant');
                e.target.parentElement.classList.remove('border-primary');
            }
        });
    </script>
