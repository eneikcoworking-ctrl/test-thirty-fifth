<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Security Portal - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#2d3133",
                    "primary-fixed-dim": "#b4c5ff",
                    "surface-container-lowest": "#ffffff",
                    "surface-variant": "#e0e3e5",
                    "on-surface-variant": "#434655",
                    "outline": "#737686",
                    "on-surface": "#191c1e",
                    "primary": "#004ac6",
                    "on-tertiary": "#ffffff",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#e6e8ea",
                    "on-tertiary-fixed": "#0b1c30",
                    "surface-dim": "#d8dadc",
                    "surface-tint": "#0053db",
                    "secondary-fixed": "#dae2fd",
                    "on-error": "#ffffff",
                    "tertiary-container": "#5e6e85",
                    "surface": "#f7f9fb",
                    "surface-container-highest": "#e0e3e5",
                    "surface-container": "#eceef0",
                    "error-container": "#ffdad6",
                    "background": "#f7f9fb",
                    "on-primary": "#ffffff",
                    "tertiary": "#46566c",
                    "inverse-on-surface": "#eff1f3",
                    "on-primary-fixed": "#00174b",
                    "tertiary-fixed-dim": "#b7c8e1",
                    "on-tertiary-fixed-variant": "#38485d",
                    "on-primary-fixed-variant": "#003ea8",
                    "tertiary-fixed": "#d3e4fe",
                    "on-secondary-fixed-variant": "#3f465c",
                    "on-secondary-container": "#5c647a",
                    "secondary-container": "#dae2fd",
                    "on-secondary-fixed": "#131b2e",
                    "error": "#ba1a1a",
                    "on-primary-container": "#eeefff",
                    "on-background": "#191c1e",
                    "primary-container": "#2563eb",
                    "inverse-primary": "#b4c5ff",
                    "secondary": "#565e74",
                    "surface-container-low": "#f2f4f6",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#f7f9fb",
                    "outline-variant": "#c3c6d7",
                    "secondary-fixed-dim": "#bec6e0",
                    "on-tertiary-container": "#e9f0ff",
                    "primary-fixed": "#dbe1ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "form-gutter": "1.25rem",
                    "container-padding": "1.5rem",
                    "stack-md": "1rem",
                    "stack-lg": "2rem",
                    "stack-sm": "0.5rem"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-lg-mobile": ["Manrope"],
                    "body-sm": ["Inter"],
                    "headline-lg": ["Manrope"],
                    "headline-md": ["Manrope"]
            },
            "fontSize": {
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .focus-ring:focus-within {
            border-color: #004ac6;
            border-width: 2px;
            padding: calc(0.75rem - 1px) 1rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
<!-- TopAppBar Shell -->
<header class="fixed top-0 left-0 right-0 z-50 bg-surface dark:bg-on-surface">
<div class="flex items-center px-container-padding h-14 w-full max-w-[420px] mx-auto">
<button class="mr-4 p-2 rounded-full hover:bg-surface-container-low transition-colors duration-200">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">Security Portal</h1>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-container-padding pt-14 pb-24">
<div class="w-full max-w-[420px] space-y-stack-lg">
<!-- Branding/Hero Section -->
<section class="text-center space-y-stack-sm">
<div class="w-20 h-20 bg-primary-container rounded-xl flex items-center justify-center mx-auto mb-stack-md shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-white text-4xl" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Welcome Back</h2>
<p class="text-on-surface-variant font-body-sm">Access your encrypted dashboard securely.</p>
</section>
<!-- Login Form -->
<form class="space-y-form-gutter" id="loginForm" onsubmit="event.preventDefault()">
<!-- Email Field -->
<div class="space-y-stack-sm">
<label class="block font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative group">
<input class="w-full h-14 px-4 bg-white border border-outline-variant rounded-lg font-body-lg text-on-surface placeholder:text-outline/50 transition-all focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack-sm">
<div class="flex justify-between items-end">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<input class="w-full h-14 px-4 bg-white border border-outline-variant rounded-lg font-body-lg text-on-surface placeholder:text-outline/50 transition-all focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary text-on-primary rounded-lg font-label-md text-label-md shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>
</form>
<!-- Social/Secondary Auth -->
<div class="space-y-stack-md pt-4">
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-on-surface-variant font-label-sm text-label-sm">Or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="h-12 border border-outline-variant rounded-lg flex items-center justify-center hover:bg-surface-container transition-colors">
<img class="w-6 h-6 mr-2" data-alt="A clean, minimalist logo of a modern tech company in monochrome blue and white, centered on a pristine white circular background with high contrast professional lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1l2-mbRxd7zeFiGuaBWQ7K82HlWM2UjgpYJ_zN_fB3raZnsplEycRpNPHm0hkmRq9BKhjraamz2WSvOkA_1Z-IMUJv8hNGArdyoyRzlkXkMh0vcD17oAxqKv7t4hVYptsng4ZMMsfRxne8a2K2_FJ3VRz3jTBNXkx88mVWGtu-HhWbCR2QfnXKEE2rdKOu91vIfSVfy-jly_TXtQ-nCDBmi1nIXix6kSp1DR3qEmdLcnYqxsypfksyebeZilxPKVaP-z5h7aztuk"/>
<span class="font-label-md text-label-md">Google</span>
</button>
<button class="h-12 border border-outline-variant rounded-lg flex items-center justify-center hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined mr-2 text-on-surface" data-icon="fingerprint" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
<span class="font-label-md text-label-md">Biometric</span>
</button>
</div>
</div>
<!-- Footer Link -->
<p class="text-center font-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-label-md text-label-md hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[420px] z-50 px-4 py-3 bg-surface-container dark:bg-inverse-surface rounded-t-xl shadow-md flex justify-around items-center">
<!-- Login Active -->
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 scale-95 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="login" style="font-variation-settings: 'FILL' 1;">login</span>
<span class="font-label-md text-label-md">Login</span>
</a>
<!-- Register Inactive -->
<a class="flex flex-col items-center justify-center text-on-surface-variant scale-95 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
<span class="font-label-md text-label-md">Register</span>
</a>
</nav>
<script>
        // Password Visibility Toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('password');
        const visibilityIcon = toggleBtn.querySelector('.material-symbols-outlined');

        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            visibilityIcon.textContent = isPassword ? 'visibility' : 'visibility_off';
            visibilityIcon.setAttribute('data-icon', isPassword ? 'visibility' : 'visibility_off');
        });

        // Micro-interaction on button
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('click', () => {
            loginBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Authenticating...
            `;
            setTimeout(() => {
                loginBtn.innerHTML = `Sign In <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>`;
            }, 1500);
        });
    </script>
</body></html>
