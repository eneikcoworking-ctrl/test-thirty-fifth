spring.datasource.url=jdbc:h2:mem:bookmarkdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Flyway manage the schema, and hibernate validate it
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT settings
jwt.secret=extremely_long_and_very_secure_secret_key_that_is_at_least_256_bits_long_for_hmac_sha256
jwt.secret=${JWT_SECRET:developmentSecretKeyThatIsAtLeast32BytesLong123456789}
