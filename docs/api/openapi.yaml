openapi: 3.0.3
info:
  title: Bookmarks Manager API
  description: API contract for the Bookmarks Manager application.
  version: 1.0.0
servers:
  - url: /
paths:
  /api/auth/register:
    post:
      summary: Register a new user
      description: Creates a new user account and returns an authentication token.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request data (e.g., missing fields, invalid email format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (e.g., username or email already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/login:
    post:
      summary: Login user
      description: Authenticates a user and returns a token.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: User successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized (invalid username or password)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - username
        - password
        - email
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 255
          description: Unique username for the user.
        email:
          type: string
          format: email
          maxLength: 100
          description: Unique email address for the user.
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 255
          description: Password for the user account.

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: User's username.
        password:
          type: string
          format: password
          description: User's password.

    User:
      type: object
      required:
        - id
        - username
        - email
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the user.
        username:
          type: string
          description: Unique username for the user.
        email:
          type: string
          format: email
          description: Unique email address for the user.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the user was created.
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the user was last updated.

    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          description: Authentication token (e.g., JWT).
        user:
          $ref: '#/components/schemas/User'

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error message describing the problem.
        details:
          type: array
          items:
            type: string
          description: Optional list of error details (e.g., validation errors).
